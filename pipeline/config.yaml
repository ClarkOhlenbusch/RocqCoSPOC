# Open Router model IDs for the automated proof pipeline.
# See https://openrouter.ai/collections/free-models

rewrite_model:
  - "openrouter/free"
skeleton_model:
  - "openrouter/free"
fill_model:
  - "openrouter/free"

# Max retries per sub-goal fill (compile-retry)
max_fill_attempts: 3

# Generation defaults
max_tokens: 2048
temperature: 0.0

# Open Router request controls
request_timeout_sec: 60
request_retries: 2

# Legacy models (kept for manual tactic/ETR/ESR workflows)
tactic_model:
  - "openrouter/free"
etr_model:
  - "openrouter/free"
esr_model:
  - "openrouter/free"
prove_model:
  - "openrouter/free"
max_tactic_errors: 3
max_state_mismatch: 2
max_prove_attempts: 3
