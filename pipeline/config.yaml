# Open Router model IDs for the automated proof pipeline.
# Default: deepseek/deepseek-v3.2 for all stages.
# The pipeline accepts either a single model string or an ordered fallback list.

rewrite_model:
  - "deepseek/deepseek-v3.2"
skeleton_model:
  - "deepseek/deepseek-v3.2"
fill_model:
  - "deepseek/deepseek-v3.2"

# Max retries per sub-goal fill (compile-retry)
max_fill_attempts: 5
max_skeleton_attempts: 5

# Generation defaults
max_tokens: 2048
temperature: 0.0

# Open Router request controls
request_timeout_sec: 60
request_retries: 4
request_backoff_base_sec: 1.5
request_backoff_multiplier: 2.0
request_backoff_max_sec: 20.0
request_backoff_jitter_sec: 0.35
